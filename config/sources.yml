dvf:
  # Demandes de Valeurs Foncières – historical property transactions in France
  base_url: "https://files.data.gouv.fr/geo-dvf/latest/csv"
  # One CSV per year; change years as needed
  years:
    - 2022
    - 2023
    - 2024
  # DVF files are large; restrict to these departments for the MVP scope
  # (Île-de-France: 75, 92, 93, 94 — or Loire-Atlantique: 44)
  departments:
    - "75"
    - "92"
    - "93"
    - "94"
  columns_to_keep:
    - date_mutation
    - valeur_fonciere
    - type_local
    - surface_reelle_bati
    - nombre_pieces_principales
    - code_commune
    - nom_commune
    - code_departement

rents:
  # Carte des loyers 2025 — rent indicators by commune (ANIL / data.gouv.fr)
  # Two separate files: one for apartments, one for houses
  url_apartment: "https://static.data.gouv.fr/resources/carte-des-loyers-indicateurs-de-loyers-dannonce-par-commune-en-2025/20251211-145010/pred-app-mef-dhup.csv"
  url_house: "https://static.data.gouv.fr/resources/carte-des-loyers-indicateurs-de-loyers-dannonce-par-commune-en-2025/20251211-145039/pred-mai-mef-dhup.csv"
  source_year: 2025

ecb_rates:
  # ECB Data Portal – ESTR (Euro Short-Term Rate, replaced EONIA in 2022)
  api_url: "https://data-api.ecb.europa.eu/service/data/EST/B.EU000A2QQF16.WT"
  params:
    format: "jsondata"
    lastNObservations: 30
  rate_type: "ESTR"
  source: "ECB Data Portal"
  # Fallback value used if the API is unreachable (approximate 2024 ESTR)
  fallback_rate: 3.9
